<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨言</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 密码验证弹窗 -->
    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <h3>🔐 输入密码</h3>
            <input type="password" id="passwordInput" placeholder="请输入访问密码">
            <p class="password-tip" id="passwordTip"></p>
            <div class="modal-actions">
                <button id="confirmPassword" class="btn-primary">进入</button>
            </div>
        </div>
    </div>

    <!-- 设置密码弹窗 -->
    <div class="modal" id="setPasswordModal">
        <div class="modal-content">
            <h3>🔐 设置密码</h3>
            <input type="password" id="newPassword" placeholder="设置访问密码">
            <input type="password" id="confirmPasswordInput" placeholder="确认密码">
            <p class="password-tip">设置后，打开网页需要输入密码才能进入</p>
            <div class="modal-actions">
                <button id="cancelSetPassword" class="btn-secondary">取消</button>
                <button id="confirmSetPassword" class="btn-primary">设置</button>
            </div>
        </div>
    </div>

    <!-- 修改密码弹窗 -->
    <div class="modal" id="changePasswordModal">
        <div class="modal-content">
            <h3>🔐 修改密码</h3>
            <input type="password" id="oldPassword" placeholder="当前密码">
            <input type="password" id="changeNewPassword" placeholder="新密码">
            <input type="password" id="changeConfirmPassword" placeholder="确认新密码">
            <div class="modal-actions">
                <button id="backToOptions1" class="btn-secondary">返回</button>
                <button id="confirmChangePassword" class="btn-primary">确定修改</button>
            </div>
        </div>
    </div>

    <!-- 删除密码弹窗 -->
    <div class="modal" id="deletePasswordModal">
        <div class="modal-content">
            <h3>🔐 删除密码</h3>
            <input type="password" id="deletePasswordInput" placeholder="请输入当前密码确认">
            <p class="password-tip danger">删除后，网页将无需密码即可进入</p>
            <div class="modal-actions">
                <button id="backToOptions2" class="btn-secondary">返回</button>
                <button id="confirmDeletePassword" class="btn-primary btn-danger">确定删除</button>
            </div>
        </div>
    </div>

    <!-- 导入TXT小说弹窗 -->
    <div class="modal" id="importTxtModal">
        <div class="modal-content">
            <h3>📖 导入TXT小说</h3>
            <p class="import-tip">选择要导入的 TXT 文件</p>
            <input type="file" id="importTxtFile" accept=".txt" class="file-input">
            <div class="modal-actions">
                <button id="cancelImportTxt" class="btn-secondary">取消</button>
                <button id="confirmImportTxt" class="btn-primary">导入</button>
            </div>
        </div>
    </div>

    <!-- 素材库弹窗 -->
    <div class="modal" id="materialModal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>📚 素材库</h3>
                <button id="closeMaterialModal" class="btn-icon">✕</button>
            </div>
            <div class="material-container">
                <div class="material-tabs">
                    <button class="material-tab active" data-type="idioms">成语库</button>
                </div>
                <div class="material-search">
                    <input type="text" id="materialSearch" placeholder="搜索...">
                </div>
                <div class="material-list" id="materialList">
                    <!-- 素材列表 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 导入数据弹窗 -->
    <div class="modal" id="importModal">
        <div class="modal-content">
            <h3>📥 导入数据</h3>
            <p class="import-tip">选择之前导出的数据文件 (.json)</p>
            <input type="file" id="importFile" accept=".json" class="file-input">
            <p class="import-warning">⚠️ 导入将会覆盖当前所有数据，请谨慎操作！</p>
            <div class="modal-actions">
                <button id="cancelImport" class="btn-secondary">取消</button>
                <button id="confirmImport" class="btn-primary">导入</button>
            </div>
        </div>
    </div>

    <!-- 密码管理选项弹窗 -->
    <div class="modal" id="passwordOptionsModal">
        <div class="modal-content">
            <h3>🔐 密码管理</h3>
            <div class="password-options">
                <button id="optionChangePassword" class="btn-option">
                    <span class="btn-option-icon">✏️</span>
                    <span class="btn-option-text">更改密码</span>
                </button>
                <button id="optionDeletePassword" class="btn-option">
                    <span class="btn-option-icon">🗑️</span>
                    <span class="btn-option-text">删除密码</span>
                </button>
            </div>
            <div class="modal-actions">
                <button id="closePasswordOptions" class="btn-secondary">关闭</button>
            </div>
        </div>
    </div>

    <div class="app" style="display:none;">
        <!-- 左侧边栏 - 小说列表 -->
        <aside class="sidebar sidebar-novels" id="sidebarNovels">
            <div class="resize-handle" data-side="novels"></div>
            <div class="sidebar-header">
                <h1>🖊️ 墨言</h1>
                <div class="header-actions">
                    <button id="newNovelBtn" class="btn-primary">+ 新建小说</button>
                </div>
            </div>
            <div class="novels-list" id="novelsList">
                <!-- 小说列表动态生成 -->
            </div>
            <div class="sidebar-footer">
                <span id="saveStatus">已保存</span>
                <span id="tabStatus" class="tab-status">📱 当前标签页</span>
            </div>
            <div class="novels-footer-actions">
                <button id="passwordBtn" class="btn-secondary btn-small" title="密码管理">🔒 密码设置</button>
            </div>
        </aside>

        <!-- 中间边栏 - 章节列表 -->
        <aside class="sidebar sidebar-chapters" id="sidebarChapters">
            <div class="resize-handle" data-side="chapters"></div>
            <div class="sidebar-header">
                <div class="current-novel-title" id="currentNovelTitle">请选择小说</div>
                <button id="renameNovelBtn" class="btn-icon" title="重命名">✏️</button>
            </div>
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="chapters">📖 章节</button>
                <button class="sidebar-tab" data-tab="mindmap">🧠 思维导图</button>
            </div>
            <div class="sidebar-actions">
                <button id="newChapterBtn" class="btn-secondary btn-small">+ 新建章节</button>
            </div>
            <div class="chapters-list" id="chaptersList">
                <!-- 章节列表动态生成 -->
            </div>
            <div class="mindmap-view" id="mindMapView" style="display:none;">
                <div class="mindmap-toolbar">
                    <button id="newMindMapBtn2" class="btn-secondary btn-small">🧠 新建思维导图</button>
                    <select id="mindMapSelect" class="mindmap-select">
                        <option value="">选择思维导图...</option>
                    </select>
                </div>
                <div class="mindmap-content" id="mindMapContent">
                    <!-- 思维导图内容 -->
                </div>
            </div>
        </aside>

        <!-- 主编辑区 -->
        <main class="editor">
            <div class="editor-header">
                <input type="text" id="chapterTitle" placeholder="章节标题..." class="title-input">
                <div class="toolbar">
                    <button id="saveBtn" class="btn-icon" title="保存 (Ctrl+S)">💾</button>
                    <button id="searchReplaceBtn" class="btn-icon" title="搜索与替换">🔍</button>
                    <button id="exportTxtBtn" class="btn-icon" title="导出 TXT">📄</button>
                    <button id="exportDocBtn" class="btn-icon" title="导出 Word">📘</button>
                    <button id="backupBtn" class="btn-icon" title="导出数据">📦</button>
                    <button id="restoreBtn" class="btn-icon" title="导入数据">📥</button>
                    <button id="importTxtBtn" class="btn-icon" title="导入TXT小说">📖</button>
                    <button id="materialBtn" class="btn-icon" title="素材库">📚</button>
                    <button id="themeBtn" class="btn-icon" title="切换主题">🌙</button>
                </div>
            </div>
            <!-- 格式工具栏 -->
            <div class="format-toolbar">
                <select id="fontFamily" class="format-select" title="字体">
                    <option value="默认">字体</option>
                    <option value="宋体">宋体</option>
                    <option value="黑体">黑体</option>
                    <option value="楷体">楷体</option>
                    <option value="微软雅黑">微软雅黑</option>
                    <option value="Arial">Arial</option>
                    <option value="Times New Roman">Times New Roman</option>
                </select>
                <select id="fontSize" class="format-select" title="字号">
                    <option value="">字号</option>
                    <option value="14px">小</option>
                    <option value="16px">标准</option>
                    <option value="18px">中</option>
                    <option value="20px">大</option>
                    <option value="24px">特大</option>
                    <option value="28px">超大</option>
                </select>
                <div class="format-divider"></div>
                <button id="boldBtn" class="format-btn" title="粗体 (Ctrl+B)"><b>B</b></button>
                <button id="italicBtn" class="format-btn" title="斜体 (Ctrl+I)"><i>I</i></button>
                <button id="underlineBtn" class="format-btn" title="下划线 (Ctrl+U)"><u>U</u></button>
                <div class="format-divider"></div>
                <input type="color" id="textColor" class="color-picker" title="字体颜色" value="#2c2c2c">
                <button id="highlightBtn" class="format-btn" title="高亮">🖍️</button>
                <div class="format-divider"></div>
                <button id="clearFormatBtn" class="format-btn" title="清除格式">📋</button>
            </div>
            <div class="editor-content">
                <div id="contentArea" contenteditable="true" class="content-editable" placeholder="从这里开始你的故事..."></div>
            </div>
            <div class="editor-footer">
                <span id="wordCount">0 字</span>
            </div>
        </main>
    </div>

    <!-- 新建小说弹窗 -->
    <div class="modal" id="newNovelModal">
        <div class="modal-content">
            <h3>新建小说</h3>
            <input type="text" id="newNovelTitle" placeholder="小说标题">
            <div class="modal-actions">
                <button id="cancelNewNovel" class="btn-secondary">取消</button>
                <button id="confirmNewNovel" class="btn-primary">创建</button>
            </div>
        </div>
    </div>

    <!-- 新建章节弹窗 -->
    <div class="modal" id="newChapterModal">
        <div class="modal-content">
            <h3>新建章节</h3>
            <input type="text" id="newChapterTitle" placeholder="章节标题">
            <div class="modal-actions">
                <button id="cancelNewChapter" class="btn-secondary">取消</button>
                <button id="confirmNewChapter" class="btn-primary">创建</button>
            </div>
        </div>
    </div>

    <!-- 重命名小说弹窗 -->
    <div class="modal" id="renameNovelModal">
        <div class="modal-content">
            <h3>重命名小说</h3>
            <input type="text" id="renameNovelInput" placeholder="新的小说标题">
            <div class="modal-actions">
                <button id="cancelRenameNovel" class="btn-secondary">取消</button>
                <button id="confirmRenameNovel" class="btn-primary">确定</button>
            </div>
        </div>
    </div>

    <!-- 搜索替换弹窗 -->
    <div class="modal" id="searchReplaceModal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>🔍 搜索与替换</h3>
                <button id="closeSearchModal" class="btn-icon">✕</button>
            </div>
            <div class="search-replace-container">
                <div class="search-options">
                    <label class="search-option">
                        <input type="radio" name="searchScope" value="selection" checked>
                        <span>当前选中段落</span>
                    </label>
                    <label class="search-option">
                        <input type="radio" name="searchScope" value="chapter">
                        <span>当前章节</span>
                    </label>
                    <label class="search-option">
                        <input type="radio" name="searchScope" value="novel">
                        <span>整本小说</span>
                    </label>
                </div>
                <div class="search-input-group">
                    <label>查找：</label>
                    <input type="text" id="searchInput" placeholder="输入要查找的内容...">
                </div>
                <div class="search-input-group">
                    <label>替换为：</label>
                    <input type="text" id="replaceInput" placeholder="输入替换内容...">
                </div>
                <div class="search-actions">
                    <button id="searchBtn" class="btn-primary">查找下一个</button>
                    <button id="replaceBtn" class="btn-secondary">替换</button>
                    <button id="replaceAllBtn" class="btn-secondary">全部替换</button>
                </div>
                <div class="search-result" id="searchResult">
                    <span class="search-status" id="searchStatus">请输入要查找的内容</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 删除小说确认弹窗 -->
    <div class="modal" id="deleteNovelConfirmModal">
        <div class="modal-content">
            <h3>🗑️ 删除小说</h3>
            <div class="delete-confirm-text">
                <p>确定要删除《<span id="deleteNovelName"></span>》吗？</p>
                <p class="danger">此操作不可恢复！</p>
            </div>
            <input type="password" id="deleteNovelPassword" placeholder="请输入密码确认">
            <p class="password-tip" id="deleteNovelPasswordTip"></p>
            <div class="modal-actions">
                <button id="cancelDeleteNovel" class="btn-secondary">取消</button>
                <button id="confirmDeleteNovel" class="btn-primary btn-danger">确定删除</button>
            </div>
        </div>
    </div>

    <!-- 删除章节确认弹窗 -->
    <div class="modal" id="deleteChaptersModal">
        <div class="modal-content">
            <h3>🗑️ 删除章节</h3>
            <div class="delete-chapters-section">
                <p>请选择要删除的章节：</p>
                <div class="chapters-checklist" id="chaptersChecklist"></div>
            </div>
            <div class="modal-actions">
                <button id="cancelDeleteChapters" class="btn-secondary">取消</button>
                <button id="confirmDeleteChapters" class="btn-primary btn-danger">确定删除</button>
            </div>
        </div>
    </div>

    <script src="materials.js"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
</body>
</html>
